{% extends 'base.html' %}

{% block content %}

<h1>REPORT</h1>

<a href="{{ url_for('report', num_groups=optimized_groups_list|length) }}">Re-generate groups</a>

{% for group in optimized_groups_list %}
    <p>Group {{loop.index}}  | Diversity Score: {{ metrics[loop.index-1] }}</p>
    {% for student in group %}
        <p>{{student}}</p>
    {% endfor %}

{% endfor %}


{% endblock %}
